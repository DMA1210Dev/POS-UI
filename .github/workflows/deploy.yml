name: Build & Deploy — POS UI

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Subir dist como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist
          retention-days: 3

  # ════════════════════════════════════════════════════════════════════════════
  # Deploy principal → cPanel vía FTP
  # ════════════════════════════════════════════════════════════════════════════
  deploy-cpanel:
    name: Deploy → cPanel (FTP)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Deploy vía FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir:  ./dist/
          exclude: |
            **/.git*
            **/.git*/**

  # ════════════════════════════════════════════════════════════════════════════
  # Deploy adicional → VPS vía SSH
  # Activar/desactivar: Settings → Variables → DEPLOY_VPS = true | false
  # Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
  # ════════════════════════════════════════════════════════════════════════════
  deploy-vps:
    name: Deploy → VPS (ui.domercd.com)
    runs-on: ubuntu-latest
    needs: build
    if: vars.DEPLOY_VPS == 'true'

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Subir archivos al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:             ${{ secrets.VPS_HOST }}
          username:         ${{ secrets.VPS_USER }}
          key:              ${{ secrets.VPS_SSH_KEY }}
          source:           "dist/"
          target:           /var/www/pos-ui
          strip_components: 1
