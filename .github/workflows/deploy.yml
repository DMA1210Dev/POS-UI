name: Build & Deploy — POS UI

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Deploy → cPanel vía FTP  (usa VITE_API_URL del secret)
  # ════════════════════════════════════════════════════════════════════════════
  deploy-cpanel:
    name: Deploy → cPanel (FTP)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build (cPanel)
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy vía FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir:  ./dist/
          exclude: |
            **/.git*
            **/.git*/**

  # ════════════════════════════════════════════════════════════════════════════
  # Deploy → VPS vía SSH  (VITE_API_URL fijo a api.domercd.com)
  # Activar/desactivar: Settings → Variables → DEPLOY_VPS = true | false
  # ════════════════════════════════════════════════════════════════════════════
  deploy-vps:
    name: Deploy → VPS (ui.domercd.com)
    runs-on: ubuntu-latest
    if: vars.DEPLOY_VPS == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build (VPS)
        run: npm run build
        env:
          VITE_API_URL: https://api.domercd.com

      - name: Subir archivos al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:             ${{ secrets.VPS_HOST }}
          username:         ${{ secrets.VPS_USER }}
          key:              ${{ secrets.VPS_SSH_KEY }}
          source:           "dist/"
          target:           /var/www/pos-ui
          strip_components: 1

      - name: Fijar permisos
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script:   |
            chown -R ubuntu:www-data /var/www/pos-ui
            chmod -R 755 /var/www/pos-ui
