name: Build & Deploy — POS UI

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build + Deploy → VPS (ui.domercd.com)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.domercd.com

      # ── Subir dist/ al VPS ──────────────────────────────────────────────
      # Secrets requeridos:
      #   VPS_HOST     → IP o dominio del VPS
      #   VPS_USER     → usuario SSH (ej: root)
      #   VPS_SSH_KEY  → clave privada SSH
      - name: Subir archivos al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:             ${{ secrets.VPS_HOST }}
          username:         ${{ secrets.VPS_USER }}
          key:              ${{ secrets.VPS_SSH_KEY }}
          source:           "dist/"
          target:           /var/www/pos-ui
          strip_components: 1
